<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<title>Dee's Gym Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#161920;--card:#1e2230;--border:#2a2f3d;
  --accent:#e8b84b;--accent2:#5b9cf6;--green:#4caf7d;
  --text:#e8eaf0;--muted:#6b7280;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
  --r:10px;--r-lg:16px;
}
html{background:var(--bg)}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;-webkit-text-size-adjust:100%}
.app{max-width:860px;margin:0 auto;padding:0 16px 100px;padding-top:env(safe-area-inset-top,0)}
.header{display:flex;align-items:center;justify-content:space-between;padding:24px 0 20px;border-bottom:1px solid var(--border);margin-bottom:28px}
.header-title{font-family:var(--font-display);font-size:2.4rem;letter-spacing:2px;color:var(--accent);line-height:1}
.header-sub{font-size:0.75rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.date-badge{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:6px 14px;font-size:0.8rem;color:var(--muted);font-family:var(--font-mono)}
.nav{display:flex;gap:6px;margin-bottom:24px;background:var(--surface);border-radius:var(--r-lg);padding:5px;border:1px solid var(--border)}
.nav-btn{flex:1;padding:9px 6px;border:none;border-radius:var(--r);cursor:pointer;font-family:var(--font-body);font-size:0.78rem;font-weight:500;transition:all 0.18s ease;background:transparent;color:var(--muted)}
.nav-btn.active{background:var(--accent);color:#0d0f14;font-weight:600}
.day-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
@media(min-width:600px){.day-grid{grid-template-columns:repeat(3,1fr)}}
.day-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;transition:all 0.18s ease;position:relative}
.day-card:active{border-color:var(--accent);background:rgba(232,184,75,0.08)}
.day-card-name{font-family:var(--font-display);font-size:1.1rem;letter-spacing:1px;color:var(--accent);margin-bottom:3px}
.day-card-sub{font-size:0.72rem;color:var(--muted)}
.day-card-badge{position:absolute;top:10px;right:10px;width:8px;height:8px;border-radius:50%;background:var(--green)}
.tag{font-size:0.68rem;padding:2px 8px;border-radius:20px;font-family:var(--font-mono);background:var(--surface);border:1px solid var(--border);color:var(--muted)}
.tag-green{font-size:0.68rem;padding:2px 8px;border-radius:20px;font-family:var(--font-mono);background:rgba(76,175,125,0.12);border:1px solid var(--green);color:var(--green)}
.tag-gold{font-size:0.68rem;padding:2px 8px;border-radius:20px;font-family:var(--font-mono);background:rgba(232,184,75,0.12);border:1px solid var(--accent);color:var(--accent)}
.section-divider{display:flex;align-items:center;gap:10px;margin:20px 0 14px}
.section-divider-line{flex:1;height:1px;background:var(--border)}
.section-label-main{font-size:0.7rem;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px;padding:3px 10px;border-radius:20px;background:rgba(91,156,246,0.12);border:1px solid rgba(91,156,246,0.3);color:var(--accent2)}
.section-label-abs{font-size:0.7rem;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:1px;padding:3px 10px;border-radius:20px;background:rgba(76,175,125,0.12);border:1px solid rgba(76,175,125,0.4);color:var(--green)}
.abs-badge{font-size:0.65rem;color:var(--green);font-family:var(--font-mono);background:rgba(76,175,125,0.12);border:1px solid rgba(76,175,125,0.3);border-radius:4px;padding:1px 6px}
.back-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:7px 14px;font-size:0.78rem;cursor:pointer;color:var(--muted);font-family:var(--font-body)}
.save-btn{width:100%;padding:15px;border:none;border-radius:var(--r-lg);background:var(--accent);color:#0d0f14;font-family:var(--font-display);font-size:1.2rem;letter-spacing:2px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.set-input{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:7px 8px;font-size:0.82rem;color:var(--text);font-family:var(--font-mono);width:100%;outline:none;-webkit-appearance:none}
.set-input:focus{border-color:var(--accent2)}
.mark-btn-done{padding:7px 0;border-radius:7px;width:100%;cursor:pointer;font-size:0.75rem;font-family:var(--font-body);background:rgba(76,175,125,0.15);border:1px solid var(--green);color:var(--green);-webkit-tap-highlight-color:transparent}
.mark-btn-undone{padding:7px 0;border-radius:7px;width:100%;cursor:pointer;font-size:0.75rem;font-family:var(--font-body);background:var(--surface);border:1px solid var(--border);color:var(--muted);-webkit-tap-highlight-color:transparent}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:12px 24px;border-radius:30px;font-size:0.85rem;font-weight:500;z-index:999;transition:transform 0.3s ease;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:0.75rem;cursor:pointer;font-family:var(--font-body);-webkit-tap-highlight-color:transparent}
.filter-btn.active{background:rgba(91,156,246,0.15);border-color:var(--accent2);color:var(--accent2)}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.stat-val{font-family:var(--font-display);font-size:1.6rem;letter-spacing:1px}
.stat-val.gold{color:var(--accent)}.stat-val.blue{color:var(--accent2)}.stat-val.green{color:var(--green)}
.stat-label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:3px}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:120px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.chart-bar{width:100%;border-radius:4px 4px 0 0;background:var(--accent2);min-height:4px;position:relative}
.chart-bar.latest{background:var(--accent)}
.chart-bar-label{font-size:0.58rem;color:var(--muted);font-family:var(--font-mono);text-align:center}
.chart-bar-val{font-size:0.6rem;color:var(--text);font-family:var(--font-mono);position:absolute;top:-16px;left:50%;transform:translateX(-50%);white-space:nowrap}
.styled-select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;color:var(--text);font-size:0.85rem;font-family:var(--font-body);outline:none;cursor:pointer;-webkit-appearance:none}
.empty-state{text-align:center;padding:48px 24px;color:var(--muted);font-size:0.85rem;line-height:1.8}
.empty-icon{font-size:2.5rem;margin-bottom:12px}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
const e = React.createElement;
const { useState, useCallback } = React;

const STORAGE_KEY = "dee-gym-v1";
function loadLog() {
  try { const v = localStorage.getItem(STORAGE_KEY); return v ? JSON.parse(v) : {}; }
  catch { return {}; }
}
function persistLog(log) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(log)); } catch {}
}

const AB_FINISHERS = {
  "Monday \u2014 Lower Body A": [

    { name: "Pallof Press",        sets: 3, reps: "12 ea.", equipment: "Cable" },

  ],

    { name: "Cable Woodchop",      sets: 3, reps: "12 ea.", equipment: "Cable" },
    { name: "Total Gym Ab Crunch", sets: 3, reps: "20",     equipment: "Total Gym" },
    { name: "Dead Bug",            sets: 3, reps: "10 ea.", equipment: "Floor" },
  ],

    { name: "Pallof Press",        sets: 3, reps: "12 ea.", equipment: "Cable" },
  ],
  "Friday \u2014 Upper Body B: Pull": [
    { name: "Cable Crunch",        sets: 3, reps: "15\u201320",  equipment: "Cable (rope)" },
    { name: "Total Gym Ab Crunch", sets: 3, reps: "20",     equipment: "Total Gym" },
    { name: "Dead Bug",            sets: 3, reps: "10 ea.", equipment: "Floor" },
  ],
  "Saturday \u2014 Core + Cardio": [
    { name: "Cable Crunch",        sets: 3, reps: "15\u201320",  equipment: "Cable (rope)" },
    { name: "Cable Woodchop",      sets: 3, reps: "12 ea.", equipment: "Cable" },
    { name: "Total Gym Pike",      sets: 3, reps: "12",     equipment: "Total Gym" },
    { name: "Pallof Press",        sets: 3, reps: "12 ea.", equipment: "Cable" },
    { name: "Dead Bug",            sets: 3, reps: "10 ea.", equipment: "Floor" },
  ],
};

const PLAN = {
  "Monday \u2014 Lower Body A": [
    { name: "Barbell Back Squat",    sets: 4, reps: "6\u20138",    equipment: "Squat Rack" },
    { name: "Romanian Deadlift",     sets: 3, reps: "10\u201312",  equipment: "Barbell" },
    { name: "Bulgarian Split Squat", sets: 3, reps: "10 ea.", equipment: "Bench + DBs" },
    { name: "Cable Pull-Through",    sets: 3, reps: "12\u201315",  equipment: "Cable Low" },
    { name: "Leg Press (Total Gym)", sets: 3, reps: "15",     equipment: "Total Gym" },
    { name: "Calf Raises",           sets: 3, reps: "20",     equipment: "Barbell" },
  ],
  "Tuesday \u2014 Upper Body A: Push": [
    { name: "Incline Dumbbell Press",  sets: 4, reps: "8\u201310",   equipment: "Bench + DBs" },
    { name: "Flat Bench Press",        sets: 3, reps: "8\u201310",   equipment: "Bench + Bar" },
    { name: "Cable Chest Fly",         sets: 3, reps: "12\u201315",  equipment: "Cable High" },
    { name: "Seated Shoulder Press",   sets: 3, reps: "10\u201312",  equipment: "Bench + DBs" },
    { name: "Lateral Raises",          sets: 3, reps: "12\u201315",  equipment: "DBs/Cable" },
    { name: "Tricep Pushdown",         sets: 3, reps: "12\u201315",  equipment: "Cable Rope" },
    { name: "Push-Up Variations",      sets: 2, reps: "AMRAP",  equipment: "Total Gym" },
  ],
  "Thursday \u2014 Lower Body B": [
    { name: "Hip Thrusts",              sets: 4, reps: "10\u201312",  equipment: "Bench + Bar" },
    { name: "Good Mornings",            sets: 3, reps: "10\u201312",  equipment: "Barbell" },
    { name: "Single-Leg RDL",           sets: 3, reps: "10 ea.", equipment: "DBs/Bar" },
    { name: "Cable Standing Leg Raise", sets: 3, reps: "12 ea.", equipment: "Cable Ankle" },

  ],
  "Friday \u2014 Upper Body B: Pull": [

    { name: "Seated Cable Row",     sets: 3, reps: "10\u201312",  equipment: "Cable Low" },
    { name: "Total Gym Rows",       sets: 3, reps: "12\u201315",  equipment: "Total Gym" },
    { name: "Single-Arm Cable Row", sets: 3, reps: "12 ea.", equipment: "Cable Low" },
    { name: "Face Pulls",           sets: 3, reps: "15\u201320",  equipment: "Cable Rope" },
    { name: "Bicep Curl",           sets: 3, reps: "12\u201315",  equipment: "DBs/Cable" },
    { name: "Hammer Curl",          sets: 2, reps: "12\u201315",  equipment: "DBs" },
  ],
  "Saturday \u2014 Core + Cardio": [
    { name: "MaxiClimber Sprint",  sets: 4, reps: "3 min",  equipment: "MaxiClimber" },
    { name: "Ab Trainer Crunches", sets: 3, reps: "20",     equipment: "Ab Trainer" },
    { name: "Dynamic Plank Hold",  sets: 3, reps: "45 sec", equipment: "Ab Trainer" },
  ],
};

const AB_NAMES = new Set(Object.values(AB_FINISHERS).flat().map(ex => ex.name));

function getReco(history) {
  const recent = [...history].sort((a,b) => b.date.localeCompare(a.date)).slice(0,2);
  if (recent.length < 2) return null;
  if (!recent.every(s => s.sets && s.sets.length > 0 && s.sets.every(x => x.completed && parseFloat(x.weight) > 0))) return null;
  const ws = recent[0].sets.map(s => parseFloat(s.weight)||0).filter(w => w > 0);
  if (!ws.length) return null;
  const avg = ws.reduce((a,b) => a+b, 0) / ws.length;
  const inc = avg < 30 ? 2.5 : 5;
  return { msg: "\uD83D\uDCAA Ready to level up! Add " + inc + " lbs this session.", suggested: Math.round((avg+inc)*2)/2 };
}

function todayStr() { return new Date().toISOString().split("T")[0]; }
function fmtDate(d) { return new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"}); }
function maxW(sets) { const ws=(sets||[]).map(s=>parseFloat(s.weight)||0).filter(w=>w>0); return ws.length?Math.max(...ws):0; }
function emptySet() { return {weight:"",reps:"",completed:false}; }

function ExerciseCard(props) {
  const { ex, sets, onUpdate, onToggle, history, isAb } = props;
  const [open, setOpen] = useState(false);
  const reco = getReco(history);
  const allDone = sets.length > 0 && sets.every(s => s.completed);
  const border = reco ? "var(--accent)" : isAb ? "rgba(76,175,125,0.45)" : "var(--border)";

  const headerRows = [
    e("span",{key:"n",style:{fontSize:"0.65rem",color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.5px",fontFamily:"var(--font-mono)"}},"#"),
    e("span",{key:"w",style:{fontSize:"0.65rem",color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.5px",fontFamily:"var(--font-mono)"}},"Weight"),
    e("span",{key:"r",style:{fontSize:"0.65rem",color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.5px",fontFamily:"var(--font-mono)"}},"Reps"),
    e("span",{key:"d",style:{fontSize:"0.65rem",color:"var(--muted)",textTransform:"uppercase",letterSpacing:"0.5px",fontFamily:"var(--font-mono)"}},"Done"),
  ];

  const setRows = sets.map((s, i) =>
    e("div",{key:i,style:{display:"grid",gridTemplateColumns:"32px 1fr 1fr 76px",gap:8,marginBottom:8,alignItems:"center"}},
      e("div",{style:{width:26,height:26,borderRadius:6,background:"var(--surface)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.72rem",fontFamily:"var(--font-mono)",color:"var(--muted)",border:"1px solid var(--border)"}}, i+1),
      e("input",{className:"set-input",type:"number",inputMode:"decimal",
        placeholder: reco ? String(reco.suggested) : "lbs",
        value: s.weight||"",
        onChange: ev => onUpdate(i,"weight",ev.target.value)}),
      e("input",{className:"set-input",type:"number",inputMode:"numeric",
        placeholder: ex.reps,
        value: s.reps||"",
        onChange: ev => onUpdate(i,"reps",ev.target.value)}),
      e("button",{className: s.completed ? "mark-btn-done" : "mark-btn-undone",
        onClick: () => onToggle(i)}, s.completed ? "\u2713" : "Mark")
    )
  );

  const tags = [
    e("span",{key:"sets",className:"tag"}, ex.sets + "\u00D7" + ex.reps),
    e("span",{key:"eq",className:"tag"}, ex.equipment),
    allDone && e("span",{key:"done",className:"tag-green"}, "\u2713 Done"),
    reco && e("span",{key:"ol",className:"tag-gold"}, "\u2191 Overload"),
  ].filter(Boolean);

  return e("div",{style:{background:"var(--card)",border:"1px solid "+border,borderRadius:"var(--r-lg)",marginBottom:10,overflow:"hidden"}},
    e("div",{onClick:()=>setOpen(o=>!o),style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",cursor:"pointer",gap:12}},
      e("div",{style:{flex:1}},
        e("div",{style:{display:"flex",alignItems:"center",gap:8}},
          isAb && e("span",{className:"abs-badge"},"ABS"),
          e("span",{style:{fontSize:"0.95rem",fontWeight:600,color:"var(--text)"}}, ex.name)
        ),
        e("div",{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",marginTop:4}}, ...tags)
      ),
      e("span",{style:{color:"var(--muted)",fontSize:"0.75rem",minWidth:16,textAlign:"center",display:"inline-block",transition:"transform 0.2s",transform:open?"rotate(180deg)":"none"}}, "\u25BC")
    ),
    open && e("div",null,
      reco && e("div",{style:{margin:"0 14px 12px",padding:"10px 14px",borderRadius:"var(--r)",background:"rgba(232,184,75,0.1)",border:"1px solid rgba(232,184,75,0.3)",fontSize:"0.8rem",color:"var(--accent)",lineHeight:1.4}},
        reco.msg + " Suggested: ", e("strong",null, reco.suggested + " lbs")
      ),
      history.length > 0 && e("div",{style:{padding:"0 14px 8px",fontSize:"0.72rem",color:"var(--muted)"}},
        "Last: ",
        e("span",{style:{color:"var(--accent2)",fontFamily:"var(--font-mono)"}}, maxW(history[history.length-1].sets) + " lbs"),
        " \u00B7 " + fmtDate(history[history.length-1].date)
      ),
      e("div",{style:{padding:"0 14px 14px"}},
        e("div",{style:{display:"grid",gridTemplateColumns:"32px 1fr 1fr 76px",gap:8,paddingBottom:6}}, ...headerRows),
        ...setRows
      )
    )
  );
}

function App() {
  const [tab, setTab] = useState("workout");
  const [log, setLog] = useState(() => loadLog());
  const [selectedDay, setSelectedDay] = useState(null);
  const [selectedDate, setSelectedDate] = useState(todayStr());
  const [toast, setToast] = useState("");
  const [histFilter, setHistFilter] = useState("all");
  const [histExp, setHistExp] = useState({});
  const [progEx, setProgEx] = useState("");

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(""), 2200); };
  const sessionKey = selectedDay ? selectedDate + "__" + selectedDay : null;

  const getHistory = useCallback(exName => {
    return Object.entries(log)
      .flatMap(([k,v]) => { const s = v.sets && v.sets[exName]; return s && s.length ? [{date:k.split("__")[0], sets:
